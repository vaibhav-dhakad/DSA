version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chatdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on: [zookeeper]
    ports:
      - '9092:9092'
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  auth-service:
    build: ./services/auth-service
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://chat:chat@postgres:5432/chatdb
      JWT_SECRET: chat-secret
    depends_on: [postgres]
    ports:
      - '4001:4001'

  chat-service:
    build: ./services/chat-service
    environment:
      PORT: 4002
      MONGO_URL: mongodb://mongo:27017/chat
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: chat-messages
    depends_on: [mongo, kafka]
    ports:
      - '4002:4002'

  presence-service:
    build: ./services/presence-service
    environment:
      PORT: 4003
      REDIS_URL: redis://redis:6379
    depends_on: [redis]
    ports:
      - '4003:4003'

  group-service:
    build: ./services/group-service
    environment:
      PORT: 4004
      DATABASE_URL: postgresql://chat:chat@postgres:5432/chatdb
    depends_on: [postgres]
    ports:
      - '4004:4004'

  media-service:
    build: ./services/media-service
    environment:
      PORT: 4005
      MEDIA_BASE_URL: http://localhost:4005/uploads
    ports:
      - '4005:4005'

  frontend:
    build: ./frontend
    depends_on: [auth-service, chat-service, presence-service, group-service, media-service]
    ports:
      - '5173:5173'

volumes:
  postgres_data:
  mongo_data:
